<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="color-scheme" content="light dark" />
        <title>__MSG_popupTitle__</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="container">
            <!-- Active Jobposting Section -->
            <div id="jobposting-section" class="jobposting-section">
                <div class="jobposting-header">
                    <span id="jobposting-status-led" class="status-led gray"></span>
                    <span id="jobposting-status-text" data-i18n="popupNoActiveJobposting">__MSG_popupNoActiveJobposting__</span>
                </div>

                 <div id="jobposting-current" class="jobposting-current hidden">
                    <span id="jobposting-current-kid" class="jobposting-kid-link" title="Click to open jobposting"></span>
                    <button type="button" id="set-active-jobposting-btn" class="btn-small">
                        __MSG_popupSetActiveJobposting__
                    </button>
                </div>

                <div id="jobposting-active" class="jobposting-active hidden">
                    <span>__MSG_popupActiveJobposting__: </span>
                    <strong id="jobposting-active-kid" class="jobposting-kid-link" title="Click to open jobposting"></strong>
                    <button type="button" id="clear-active-jobposting-btn" class="btn-small btn-link">
                        __MSG_popupClearActiveJobposting__
                    </button>
                </div>
            </div>

            <div id="buttons-container">
                <!-- Buttons werden hier dynamisch eingefügt -->
            </div>
            <div id="status-message"></div>
            <div id="response-container" class="hidden">
                <div class="response-header">
                    <span id="response-title">__MSG_popupResponseHeader__</span>
                    <button type="button" id="copy-response-btn">__MSG_popupCopyResponseButton__</button>
                </div>
                <div id="response-content"></div>
            </div>
            <div class="footer">
                <a href="#" id="open-options">__MSG_popupSettingsLink__</a>
            </div>
        </div>
        <script src="../utils/browser-polyfill.js"></script>
        <script src="../utils/utils.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
